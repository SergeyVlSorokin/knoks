<!doctype html>
<!-- Three variants of a Client × weekday time-entry grid. The cell is a daily aggregate; each variant tests a different details-on-demand treatment. Switch with ?variant=A/B/C. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Weekly Time Grid Prototype</title>
  <style>
    :root{--ink:#17231e;--muted:#6a756f;--line:#d9e1dc;--wash:#f4f7f5;--paper:#fff;--green:#176846;--green2:#e2f2e9;--blue:#245f8e;--red:#a43832;--amber:#a65d08;--shadow:0 14px 40px #12271d2b}
    *{box-sizing:border-box}body{margin:0;background:var(--wash);color:var(--ink);font:14px/1.4 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}h1,h2,h3,p{margin-top:0}h1{margin-bottom:3px;font-size:25px;letter-spacing:-.03em}h2{font-size:17px}.muted{color:var(--muted)}
    .appbar{height:58px;padding:0 26px;display:flex;align-items:center;justify-content:space-between;background:#153e2e;color:white}.brand{display:flex;align-items:center;gap:10px;font-weight:800}.mark{width:29px;height:29px;display:grid;place-items:center;border-radius:8px;background:#6bd19f;color:#123c2c}.member{color:#dcebe4}.page{padding:23px 28px 100px}.page.with-drawer{padding-right:380px}.page-head{display:flex;justify-content:space-between;align-items:end;margin-bottom:14px}.nav,.actions{display:flex;gap:7px;align-items:center}.btn{border:1px solid var(--line);border-radius:8px;padding:7px 11px;background:white;color:var(--ink);font-weight:700}.btn.primary{border-color:var(--green);background:var(--green);color:white}.btn.ghost{border-color:transparent;background:transparent}.btn.danger{color:var(--red)}
    .week-card{overflow:hidden;border:1px solid var(--line);border-radius:10px;background:white;box-shadow:0 1px 2px #1731250b}.grid{display:grid;grid-template-columns:minmax(180px,1.45fr) repeat(5,minmax(112px,1fr)) 105px;min-width:930px}.grid-head{background:#eef3f0;border-bottom:1px solid var(--line);font-size:12px;font-weight:800}.grid-head>div{min-height:56px;padding:9px 11px;display:flex;flex-direction:column;justify-content:center;border-left:1px solid var(--line)}.grid-head>div:first-child{border-left:0}.grid-head strong{font-size:14px}.today-head{background:#e1f0e8}.client-cell{min-height:69px;padding:11px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);font-weight:750}.client-cell small{display:block;margin-top:2px;color:var(--muted);font-weight:500}.time-cell{position:relative;min-height:69px;padding:8px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center}.time-cell.today{background:#fbfdfc}.cell-total{width:100%;min-height:49px;border:1px solid transparent;border-radius:7px;background:transparent;color:var(--ink);font-weight:800}.cell-total:hover,.cell-total.selected{border-color:#82b79d;background:#edf7f1}.cell-total small{display:block;color:var(--muted);font-size:10px;font-weight:600}.cell-input{width:100%;height:38px;border:1px dashed #b8c5be;border-radius:7px;padding:6px;text-align:center;background:#fafcfb}.cell-input:hover,.cell-input:focus{outline:0;border-style:solid;border-color:var(--green);box-shadow:0 0 0 3px #d9efe4}.row-total{min-height:69px;padding:8px 12px;display:flex;align-items:center;justify-content:flex-end;border-left:1px solid var(--line);border-bottom:1px solid var(--line);font-weight:850;background:#fafcfb}.grid-footer{background:#f0f4f2;font-weight:850}.grid-footer>div{min-height:51px;padding:10px 12px;display:flex;align-items:center;justify-content:flex-end;border-left:1px solid var(--line)}.grid-footer>div:first-child{justify-content:flex-start;border-left:0}.hint{margin-top:10px;color:var(--muted);font-size:12px}.hint kbd{padding:1px 5px;border:1px solid #cbd4cf;border-bottom-width:2px;border-radius:4px;background:white}
    .tag{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 7px;font-size:11px;font-weight:750}.tag.bill{background:#e2f2e9;color:#176442}.tag.non{background:#edf0f3;color:#56636c}.dot{width:6px;height:6px;border-radius:50%;background:currentColor}.entry{display:grid;grid-template-columns:72px minmax(120px,1fr) 115px 31px;gap:10px;align-items:center;padding:9px 0;border-top:1px solid #e7ece9}.entry:first-child{border-top:0}.entry strong{font-size:13px}.entry p{margin:1px 0 0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.entry-actions{border:0;background:transparent}.composer{display:grid;grid-template-columns:92px 125px 1fr auto;gap:9px;align-items:end;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}.field{display:grid;gap:4px}.field label{font-size:11px;font-weight:750;color:#4e5d55}.field input,.field select,.field textarea{width:100%;border:1px solid #bbc8c1;border-radius:7px;padding:8px;background:white;color:var(--ink)}.field textarea{min-height:66px;resize:vertical}.error{min-height:18px;color:var(--red);font-size:11px}
    .summary-stack{width:100%;display:grid;gap:2px;font-size:10px;font-weight:700;color:var(--muted);text-align:right}.summary-stack strong{padding-top:2px;border-top:1px solid var(--line);font-size:12px;color:var(--ink)}.cell-kind,.cell-breakdown{margin-top:3px}.cell-kind.bill{color:var(--green)}.cell-kind.non{color:#68747e}.cell-breakdown{color:var(--muted)}.grid-footer{border-top:0}.grid-footer>div{min-height:31px;padding-top:5px;padding-bottom:5px}.grid-footer.total{border-top:1px solid #c7d2cc}.grid-footer.total>div{font-size:13px;color:var(--ink)}
    .grid{grid-template-columns:minmax(155px,1.35fr) repeat(7,minmax(88px,1fr)) 105px}
    /* A: anchored popover */
    .popover{position:fixed;z-index:10;width:460px;padding:16px;border:1px solid #cbd6d0;border-radius:12px;background:white;box-shadow:var(--shadow)}.popover:before{content:"";position:absolute;top:-7px;left:40px;width:12px;height:12px;transform:rotate(45deg);border-left:1px solid #cbd6d0;border-top:1px solid #cbd6d0;background:white}.detail-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}.detail-head h2{margin-bottom:2px}
    /* B: persistent drawer */
    .drawer{position:fixed;z-index:5;top:58px;right:0;bottom:0;width:352px;padding:21px;border-left:1px solid var(--line);background:white;box-shadow:-8px 0 24px #1731250c;overflow:auto}.drawer .entry{grid-template-columns:62px 1fr 28px}.drawer .entry .tag{grid-column:2}.drawer .composer{grid-template-columns:1fr 1fr}.drawer .composer .description,.drawer .composer .submit{grid-column:1/-1}
    /* C: inline expansion */
    .inline-detail{grid-column:1/-1;padding:14px 18px 17px 205px;border-bottom:1px solid #b9d3c5;background:#f0f8f4}.inline-detail .composer{grid-template-columns:92px 125px minmax(220px,1fr) auto}.inline-label{float:left;margin-left:-186px;width:165px;color:var(--green);font-weight:800}
    dialog{width:min(500px,calc(100vw - 28px));padding:0;border:0;border-radius:13px;box-shadow:var(--shadow)}dialog::backdrop{background:#10231aa8}.dialog-head{padding:16px 18px;display:flex;justify-content:space-between;border-bottom:1px solid var(--line)}.dialog-body{padding:18px;display:grid;gap:12px}.dialog-actions{padding:13px 18px;display:flex;justify-content:space-between;border-top:1px solid var(--line);background:#f8faf9}
    .switcher{position:fixed;z-index:30;left:50%;bottom:17px;transform:translateX(-50%);display:flex;align-items:center;gap:6px;padding:6px;border-radius:999px;background:#101d18;color:white;box-shadow:0 10px 30px #07110d99}.switcher button{width:35px;height:33px;border:0;border-radius:50%;background:#293a33;color:white;font-size:18px}.switcher-label{min-width:250px;text-align:center;font-weight:750}.flag{position:fixed;right:10px;bottom:9px;color:#7a837e;font-size:10px}@media(max-width:1100px){.page.with-drawer{padding-right:28px}.drawer{position:static;width:auto;margin:12px 28px 90px;border:1px solid var(--line);border-radius:10px}.grid{min-width:850px}.week-card{overflow:auto}}
  </style>
</head>
<body>
<header class="appbar"><div class="brand"><span class="mark">T</span>Consulting Time</div><div class="member">Alex Berg · Member</div></header>
<main id="app"></main>
<dialog id="editDialog"><form id="editForm"><div class="dialog-head"><div><strong>Edit Time Entry</strong><div id="editContext" class="muted"></div></div><button type="button" class="btn ghost close">✕</button></div><div class="dialog-body"><input type="hidden" name="id"><div class="field"><label>Duration</label><input name="duration" required></div><div class="field"><label>Classification</label><select name="billing"><option>Billable</option><option>Non-billable</option></select></div><div class="field"><label>Description (optional, 500 max)</label><textarea name="description" maxlength="500"></textarea></div><div class="error"></div></div><div class="dialog-actions"><button type="button" class="btn ghost danger delete">Delete</button><div><button type="button" class="btn close">Cancel</button> <button class="btn primary">Save</button></div></div></form></dialog>
<div class="switcher"><button id="previous" aria-label="Previous variant">←</button><div id="variantLabel" class="switcher-label"></div><button id="next" aria-label="Next variant">→</button></div><div class="flag">THROWAWAY PROTOTYPE · IN-MEMORY DATA</div>
<script>
const variants=[{key:'A',name:'Cell popover'},{key:'B',name:'Details drawer'},{key:'C',name:'Expandable row'}];
const dates=['2026-07-13','2026-07-14','2026-07-15','2026-07-16','2026-07-17','2026-07-18','2026-07-19'];const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const clients=['Northstar AB','Öresund Digital','Vasa Health'];let selected={client:'Northstar AB',date:'2026-07-15'};let nextId=12;
let entries=[{id:1,client:'Northstar AB',date:dates[0],duration:150,description:'Discovery workshop',billing:'Billable'},{id:2,client:'Northstar AB',date:dates[1],duration:75,description:'API integration planning',billing:'Billable'},{id:3,client:'Northstar AB',date:dates[2],duration:60,description:'Weekly status meeting',billing:'Non-billable'},{id:4,client:'Öresund Digital',date:dates[0],duration:90,description:'Client-team coordination',billing:'Non-billable'},{id:5,client:'Öresund Digital',date:dates[2],duration:150,description:'Implementation pairing',billing:'Billable'},{id:6,client:'Öresund Digital',date:dates[2],duration:60,description:'Technical review',billing:'Non-billable'},{id:7,client:'Vasa Health',date:dates[1],duration:240,description:'Prototype review and revisions',billing:'Billable'},{id:8,client:'Vasa Health',date:dates[3],duration:120,description:'Design-system review',billing:'Billable'},{id:9,client:'Vasa Health',date:dates[4],duration:45,description:'Planning call',billing:'Non-billable'},{id:10,client:'Northstar AB',date:dates[5],duration:120,description:'Release support',billing:'Billable'},{id:11,client:'Vasa Health',date:dates[6],duration:60,description:'Weekend incident review',billing:'Non-billable'}];
const app=document.querySelector('#app'),dialog=document.querySelector('#editDialog'),editForm=document.querySelector('#editForm');
function variant(){const k=new URLSearchParams(location.search).get('variant')||'A';return variants.some(v=>v.key===k)?k:'A'}function cellEntries(c,d){return entries.filter(e=>e.client===c&&e.date===d)}function total(list){return list.reduce((n,e)=>n+e.duration,0)}function billingTotal(list,billing){return total(list.filter(e=>e.billing===billing))}function fmt(n){const h=Math.floor(n/60),m=n%60;return m?`${h} h ${String(m).padStart(2,'0')} min`:`${h} h`}function parse(v){const s=String(v).trim().replace(',','.');if(/^\d+:\d{1,2}$/.test(s)){const [h,m]=s.split(':').map(Number);return m<60?h*60+m:NaN}if(/^\d+(\.\d+)?$/.test(s)){const minutes=Number(s)*60;return Number.isInteger(minutes)?minutes:NaN}return NaN}function dayTotal(d,except=0){return total(entries.filter(e=>e.date===d&&e.id!==except))}function badge(e){return `<span class="tag ${e.billing==='Billable'?'bill':'non'}"><span class="dot"></span>${e.billing}</span>`}function cellBreakdown(list){const b=billingTotal(list,'Billable'),n=billingTotal(list,'Non-billable');if(b&&n)return `<small class="cell-breakdown">B ${fmt(b)} · NB ${fmt(n)}</small>`;const billing=b?'Billable':'Non-billable';return `<small class="cell-kind ${b?'bill':'non'}"><span class="dot"></span> ${billing}</small>`}function summary(list){return `<div class="summary-stack"><span>B ${fmt(billingTotal(list,'Billable'))}</span><span>NB ${fmt(billingTotal(list,'Non-billable'))}</span><strong>${fmt(total(list))}</strong></div>`}
function grid(){let rows='';for(const c of clients){const clientEntries=entries.filter(e=>e.client===c);rows+=`<div class="client-cell">${c}</div>`;for(const d of dates){const list=cellEntries(c,d),n=total(list),active=selected.client===c&&selected.date===d;rows+=`<div class="time-cell ${d===dates[2]?'today':''}">${n?`<button class="cell-total ${active?'selected':''}" data-cell data-client="${c}" data-date="${d}">${fmt(n)}${cellBreakdown(list)}</button>`:`<input class="cell-input" data-empty data-client="${c}" data-date="${d}" inputmode="decimal" placeholder="+ time" aria-label="Add ${c} time on ${d}">`}</div>`}rows+=`<div class="row-total">${summary(clientEntries)}</div>`;if(variant()==='C'&&selected.client===c)rows+=detail('inline')}
const footerRow=(label,billing)=>`<div class="grid grid-footer ${billing?'':'total'}"><div>${label}</div>${dates.map(d=>{const list=entries.filter(e=>e.date===d);return `<div>${fmt(billing?billingTotal(list,billing):total(list))}</div>`}).join('')}<div>${fmt(billing?billingTotal(entries,billing):total(entries))}</div></div>`;return `<div class="week-card"><div class="grid grid-head"><div>Client</div>${dates.map((d,i)=>`<div class="${d===dates[2]?'today-head':''}"><span>${days[i]}</span><strong>${d.slice(-2)} Jul</strong></div>`).join('')}<div>Week</div></div><div class="grid">${rows}</div>${footerRow('Billable','Billable')}${footerRow('Non-billable','Non-billable')}${footerRow('Total')}</div>`}
function entryRows(){const list=cellEntries(selected.client,selected.date);return list.length?list.map(e=>`<div class="entry"><strong>${fmt(e.duration)}</strong><div><strong>${e.description||'No description'}</strong><p>${selected.client}</p></div>${badge(e)}<button class="entry-actions edit" data-id="${e.id}">•••</button></div>`).join(''):'<p class="muted">No Time Entries yet.</p>'}
function composer(mode){return `<form class="composer"><div class="field"><label>Duration</label><input name="duration" placeholder="1:30" required></div><div class="field"><label>Classification</label><select name="billing"><option>Billable</option><option>Non-billable</option></select></div><div class="field description"><label>Description (optional)</label><input name="description" maxlength="500" placeholder="What did you work on?"></div><button class="btn primary submit">Add</button><div class="error" style="grid-column:1/-1"></div></form>`}
function detail(mode){return `<section class="${mode==='popover'?'popover':mode==='drawer'?'drawer':'inline-detail'}" id="detail"><div class="${mode==='inline'?'inline-label':''}">${mode==='inline'?'Cell details':''}</div><div class="detail-head"><div><h2>${selected.client}</h2><div class="muted">${selected.date} · ${fmt(total(cellEntries(selected.client,selected.date)))}</div></div>${mode!=='drawer'?'<button class="btn ghost close-detail">✕</button>':''}</div>${entryRows()}${composer(mode)}</section>`}
function render(){const v=variant();document.querySelector('#variantLabel').textContent=`${v} — ${variants.find(x=>x.key===v).name}`;app.innerHTML=`<section class="page ${v==='B'?'with-drawer':''}"><div class="page-head"><div><div class="muted">My time</div><h1>Week 29</h1><span class="muted">2026-07-13 – 2026-07-19</span></div><div class="actions"><button class="btn">‹</button><button class="btn">This week</button><button class="btn">›</button><button class="btn">+ Add Client row</button></div></div>${grid()}<div class="hint">Type a duration into an empty cell and press <kbd>Enter</kbd>. Select a populated cell for its Time Entries and descriptions. <kbd>Tab</kbd> moves across the week.</div></section>${v==='A'?detail('popover'):v==='B'?detail('drawer'):''}`;positionPopover();bind()}
function positionPopover(){if(variant()!=='A')return;const target=[...document.querySelectorAll('[data-cell]')].find(x=>x.dataset.client===selected.client&&x.dataset.date===selected.date),pop=document.querySelector('.popover');if(!target||!pop)return;const r=target.getBoundingClientRect();pop.style.left=`${Math.min(innerWidth-480,Math.max(16,r.left))}px`;pop.style.top=`${Math.min(innerHeight-pop.offsetHeight-80,r.bottom+9)}px`}
function choose(c,d){selected={client:c,date:d};render()}function focusGridCell(target){requestAnimationFrame(()=>{const node=[...document.querySelectorAll('[data-empty],[data-cell]')].find(x=>x.dataset.client===target.client&&x.dataset.date===target.date);node?.focus()})}function nextGridCell(c,d,axis,reverse=false){let ci=clients.indexOf(c),di=dates.indexOf(d),step=reverse?-1:1;if(axis==='vertical'){ci+=step;if(ci>=clients.length){ci=0;di=(di+1)%dates.length}if(ci<0){ci=clients.length-1;di=(di-1+dates.length)%dates.length}}else{di+=step;if(di>=dates.length){di=0;ci=(ci+1)%clients.length}if(di<0){di=dates.length-1;ci=(ci-1+clients.length)%clients.length}}return{client:clients[ci],date:dates[di]}}function create(c,d,value,billing='Billable',description='',focusTarget=null){const duration=parse(value);if(!Number.isFinite(duration)||duration<=0)return'Enter a positive duration such as 1:30 or 1,5.';if(dayTotal(d)+duration>1440)return`Only ${fmt(1440-dayTotal(d))} remains on this date.`;entries.push({id:nextId++,client:c,date:d,duration,billing,description:description.trim()});selected={client:c,date:d};render();if(focusTarget)focusGridCell(focusTarget);return''}
function bind(){document.querySelectorAll('[data-cell]').forEach(x=>x.onclick=()=>choose(x.dataset.client,x.dataset.date));document.querySelectorAll('[data-empty]').forEach(x=>x.onkeydown=e=>{if(e.key==='Enter'||(e.key==='Tab'&&x.value)){e.preventDefault();const axis=e.key==='Enter'?'vertical':'horizontal',target=nextGridCell(x.dataset.client,x.dataset.date,axis,e.shiftKey),error=create(x.dataset.client,x.dataset.date,x.value,'Billable','',target);if(error){x.setCustomValidity(error);x.reportValidity()}else x.setCustomValidity('')}});document.querySelectorAll('.composer').forEach(f=>f.onsubmit=e=>{e.preventDefault();const data=new FormData(f),error=create(selected.client,selected.date,data.get('duration'),data.get('billing'),data.get('description'));const node=f.querySelector('.error');if(node)node.textContent=error});document.querySelectorAll('.edit').forEach(x=>x.onclick=()=>openEdit(Number(x.dataset.id)));document.querySelectorAll('.close-detail').forEach(x=>x.onclick=()=>{const next=dates.find(d=>!cellEntries(selected.client,d).length)||dates[0];selected={client:selected.client,date:next};render()})}
function openEdit(id){const e=entries.find(x=>x.id===id);editForm.elements.id.value=e.id;editForm.elements.duration.value=`${Math.floor(e.duration/60)}:${String(e.duration%60).padStart(2,'0')}`;editForm.elements.billing.value=e.billing;editForm.elements.description.value=e.description;document.querySelector('#editContext').textContent=`${e.client} · ${e.date}`;editForm.querySelector('.error').textContent='';dialog.showModal()}
editForm.onsubmit=e=>{e.preventDefault();const data=new FormData(editForm),id=Number(data.get('id')),old=entries.find(x=>x.id===id),duration=parse(data.get('duration')),error=editForm.querySelector('.error');if(!Number.isFinite(duration)||duration<=0){error.textContent='Enter a positive duration such as 1:30.';return}if(dayTotal(old.date,id)+duration>1440){error.textContent=`Only ${fmt(1440-dayTotal(old.date,id))} remains on this date.`;return}Object.assign(old,{duration,billing:data.get('billing'),description:data.get('description').trim()});dialog.close();render()};editForm.querySelector('.delete').onclick=()=>{const id=Number(editForm.elements.id.value);if(confirm('Delete this Time Entry?')){entries=entries.filter(e=>e.id!==id);dialog.close();render()}};document.querySelectorAll('.close').forEach(x=>x.onclick=()=>dialog.close());
function cycle(step){const i=variants.findIndex(v=>v.key===variant()),next=variants[(i+step+variants.length)%variants.length],url=new URL(location.href);url.searchParams.set('variant',next.key);history.replaceState({},'',url);render()}document.querySelector('#previous').onclick=()=>cycle(-1);document.querySelector('#next').onclick=()=>cycle(1);addEventListener('keydown',e=>{if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)||document.activeElement.isContentEditable)return;if(e.key==='ArrowLeft')cycle(-1);if(e.key==='ArrowRight')cycle(1)});addEventListener('resize',positionPopover);render();
</script>
</body>
</html>
