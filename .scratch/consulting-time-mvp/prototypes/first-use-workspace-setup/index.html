<!doctype html>
<!-- THROWAWAY PROTOTYPE: Three first-use setup flows, switchable with ?variant=A/B/C. In-memory only. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>First-use workspace setup prototype</title>
  <style>
    :root{--ink:#17231e;--muted:#68756f;--line:#d7e0db;--wash:#f4f7f5;--paper:#fff;--green:#176846;--green-dark:#153e2e;--green-soft:#e2f2e9;--blue:#245f8e;--amber:#9a5b0b;--shadow:0 16px 42px #12271d20}
    *{box-sizing:border-box}body{margin:0;background:var(--wash);color:var(--ink);font:14px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}button,input,select{font:inherit}button{cursor:pointer}h1,h2,h3,p{margin-top:0}h1{font-size:27px;letter-spacing:-.035em}h2{font-size:19px}h3{font-size:15px}.muted{color:var(--muted)}.eyebrow{margin-bottom:5px;color:var(--green);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
    .appbar{height:58px;padding:0 26px;display:flex;align-items:center;justify-content:space-between;background:var(--green-dark);color:#fff}.brand{display:flex;align-items:center;gap:10px;font-weight:800}.mark{width:29px;height:29px;display:grid;place-items:center;border-radius:8px;background:#6bd19f;color:#123c2c}.person{color:#dcebe4}.layout{min-height:calc(100vh - 58px);display:grid;grid-template-columns:218px 1fr}.sidebar{padding:24px 18px;border-right:1px solid var(--line);background:#fff}.nav-title{margin:18px 10px 7px;color:#89938e;font-size:11px;font-weight:800;text-transform:uppercase}.nav-item{display:block;width:100%;margin:2px 0;padding:9px 11px;border:0;border-radius:7px;background:transparent;color:var(--ink);text-align:left}.nav-item.active{background:var(--green-soft);color:var(--green);font-weight:800}.page{padding:30px 34px 105px}.page-head{max-width:1000px;margin:0 auto 22px}.page-head h1{margin-bottom:5px}.btn{border:1px solid var(--line);border-radius:8px;padding:8px 12px;background:#fff;color:var(--ink);font-weight:750}.btn.primary{border-color:var(--green);background:var(--green);color:#fff}.btn.ghost{background:transparent}.btn:disabled{opacity:.45;cursor:not-allowed}.field{display:grid;gap:5px}.field label{font-size:12px;font-weight:800}.field input,.field select{width:100%;padding:9px 10px;border:1px solid #bdc9c3;border-radius:7px;background:#fff}.form-row{display:grid;grid-template-columns:1fr 1fr 150px auto;gap:10px;align-items:end}.notice{padding:12px 14px;border:1px solid #bcd9ca;border-radius:8px;background:#eff8f3;color:#16583e}.error{min-height:18px;color:#a43832;font-size:12px}.tag{display:inline-flex;padding:3px 7px;border-radius:999px;background:#edf1ef;color:#52615a;font-size:11px;font-weight:800}.tag.admin{background:#e6eef7;color:#245f8e}.switcher{position:fixed;z-index:50;left:50%;bottom:17px;transform:translateX(-50%);display:flex;align-items:center;gap:6px;padding:6px;border-radius:999px;background:#101d18;color:#fff;box-shadow:0 10px 30px #07110d99}.switcher button{width:35px;height:33px;border:0;border-radius:50%;background:#293a33;color:#fff;font-size:18px}.switcher-label{min-width:270px;text-align:center;font-weight:750}.flag{position:fixed;right:11px;bottom:9px;color:#78827d;font-size:10px}
    /* A: progressive checklist */
    .checklist-shell{max-width:880px;margin:0 auto;display:grid;grid-template-columns:280px 1fr;gap:18px}.progress-card,.work-card{border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 2px 4px #1731250a}.progress-card{padding:20px;align-self:start}.progress-line{height:7px;margin:10px 0 20px;overflow:hidden;border-radius:99px;background:#e7ece9}.progress-line span{display:block;height:100%;background:var(--green)}.step{display:grid;grid-template-columns:27px 1fr;gap:9px;padding:12px 0;border-top:1px solid #e9eeeb}.step:first-of-type{border-top:0}.step-index{width:25px;height:25px;display:grid;place-items:center;border:1px solid #b9c7c0;border-radius:50%;font-size:12px;font-weight:800}.step.done .step-index{border-color:var(--green);background:var(--green);color:#fff}.step.current .step-index{border:2px solid var(--green);color:var(--green)}.step strong{display:block}.step small{color:var(--muted)}.work-card{padding:24px}.work-card .form-row{grid-template-columns:1fr 1fr 135px auto}.created-list{margin-top:18px;border-top:1px solid var(--line)}.created-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #e9eeeb}
    /* B: focused wizard */
    .wizard-shell{max-width:680px;margin:20px auto}.wizard-steps{display:flex;align-items:center;justify-content:center;margin-bottom:22px}.wizard-node{display:flex;align-items:center;gap:8px;color:var(--muted);font-weight:750}.wizard-node b{width:28px;height:28px;display:grid;place-items:center;border:1px solid #b8c5be;border-radius:50%}.wizard-node.current{color:var(--green)}.wizard-node.current b,.wizard-node.done b{border-color:var(--green);background:var(--green);color:#fff}.wizard-link{width:76px;height:1px;margin:0 11px;background:#cfd8d3}.wizard-card{padding:34px;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow)}.wizard-card h1{margin-bottom:7px}.wizard-card .form-row{grid-template-columns:1fr 1fr 150px}.wizard-actions{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--line)}.summary-block{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:19px 0}.summary-item{padding:15px;border:1px solid var(--line);border-radius:9px;background:#f8faf9}.summary-item strong{display:block;margin-bottom:3px}
    /* C: admin home */
    .admin-shell{max-width:1050px;margin:0 auto}.ready-banner{display:flex;justify-content:space-between;align-items:center;margin-bottom:17px;padding:16px 18px;border:1px solid #d8c69f;border-radius:10px;background:#fff8e8}.ready-banner.complete{border-color:#bcd9ca;background:#eff8f3}.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}.metric{padding:16px;border:1px solid var(--line);border-radius:10px;background:#fff}.metric strong{display:block;font-size:24px}.admin-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}.panel{padding:20px;border:1px solid var(--line);border-radius:11px;background:#fff}.panel-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:14px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:10px 7px;border-top:1px solid #e7ece9;text-align:left}.table th{color:var(--muted);font-size:11px;text-transform:uppercase}.empty{padding:28px 10px;text-align:center;color:var(--muted)}.inline-form{display:grid;gap:9px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
    @media(max-width:850px){.layout{grid-template-columns:1fr}.sidebar{display:none}.page{padding:22px 16px 100px}.checklist-shell,.admin-grid{grid-template-columns:1fr}.metric-grid{grid-template-columns:1fr}.form-row,.work-card .form-row,.wizard-card .form-row{grid-template-columns:1fr}.switcher-label{min-width:190px}}
  </style>
</head>
<body>
<header class="appbar"><div class="brand"><span class="mark">T</span>Consulting Time</div><div class="person">Robin Lind · Administrator</div></header>
<div class="layout"><aside class="sidebar"><strong>Company Workspace</strong><div class="nav-title">Workspace</div><button class="nav-item">My time</button><button class="nav-item active">Administration</button><button class="nav-item">Invoice Bases</button><div class="nav-title">Account</div><button class="nav-item">Profile</button><button class="nav-item">Sign out</button></aside><main id="app" class="page"></main></div>
<div class="switcher"><button id="previous" aria-label="Previous variant">←</button><div id="variantLabel" class="switcher-label"></div><button id="next" aria-label="Next variant">→</button></div><div class="flag">THROWAWAY PROTOTYPE · IN-MEMORY DATA</div>
<script>
const variants=[{key:'A',name:'Progressive checklist'},{key:'B',name:'Focused wizard'},{key:'C',name:'Admin home'}];
let state={accounts:[{name:'Robin Lind',username:'robin',role:'Administrator'}],clients:[],wizardStep:1};
const app=document.querySelector('#app');
function variant(){const key=new URLSearchParams(location.search).get('variant')||'A';return variants.some(v=>v.key===key)?key:'A'}
function escaped(value){return String(value).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function ready(){return state.clients.length>0}
function accountForm(id='accountForm'){return `<form id="${id}" class="form-row"><div class="field"><label>Display name</label><input name="name" placeholder="Alex Berg" required></div><div class="field"><label>Username</label><input name="username" placeholder="alex" required></div><div class="field"><label>Role</label><select name="role"><option>Member</option><option>Administrator</option></select></div><button class="btn primary">Create account</button><div class="error" style="grid-column:1/-1"></div></form>`}
function clientForm(id='clientForm'){return `<form id="${id}" class="form-row"><div class="field"><label>Client name</label><input name="name" placeholder="Northstar AB" required></div><button class="btn primary">Create Client</button><div class="error" style="grid-column:1/-1"></div></form>`}
function accountRows(){return state.accounts.map(a=>`<div class="created-row"><div><strong>${escaped(a.name)}</strong><div class="muted">${escaped(a.username)}</div></div><span class="tag ${a.role==='Administrator'?'admin':''}">${a.role}</span></div>`).join('')}
function clientRows(){return state.clients.map(c=>`<div class="created-row"><strong>${escaped(c)}</strong><span class="tag">Active</span></div>`).join('')}
function A(){const hasAccount=state.accounts.length>1,hasClient=state.clients.length>0,current=!hasAccount?1:!hasClient?2:3;return `<div class="page-head"><div class="eyebrow">First-use setup</div><h1>Prepare the workspace</h1><p class="muted">Create the people and Client needed for the first Time Entry.</p></div><div class="checklist-shell"><section class="progress-card"><strong>${ready()?'Ready for time entry':`${current-1} of 2 required steps complete`}</strong><div class="progress-line"><span style="width:${ready()?100:(current-1)*50}%"></span></div><div class="step ${hasAccount?'done':current===1?'current':''}"><span class="step-index">${hasAccount?'✓':'1'}</span><div><strong>Create another account</strong><small>The first Administrator already exists.</small></div></div><div class="step ${hasClient?'done':current===2?'current':''}"><span class="step-index">${hasClient?'✓':'2'}</span><div><strong>Create a Client</strong><small>Time is recorded directly against Clients.</small></div></div><div class="step ${ready()?'current':''}"><span class="step-index">3</span><div><strong>Record time</strong><small>Setup guidance ends here.</small></div></div></section><section class="work-card">${ready()?`<div class="notice"><strong>Workspace ready.</strong><br>Members can now record their first Time Entry.</div><div class="wizard-actions"><span class="muted">Setup stays available in Administration.</span><button class="btn primary">Go to My time</button></div>`:current===1?`<div class="eyebrow">Step 1</div><h2>Create another account</h2><p class="muted">A generated initial password appears once after creation.</p>${accountForm()}<div class="created-list">${accountRows()}</div>`:`<div class="eyebrow">Step 2</div><h2>Create the first Client</h2><p class="muted">Only a unique display name is required.</p>${clientForm()}<div class="created-list">${clientRows()}</div>`}</section></div>`}
function B(){let step=state.wizardStep;if(ready())step=3;const nodes=[1,2,3].map((n,i)=>`${i?'<span class="wizard-link"></span>':''}<span class="wizard-node ${n<step?'done':n===step?'current':''}"><b>${n<step?'✓':n}</b>${['Account','Client','Ready'][i]}</span>`).join('');let body;if(step===1)body=`<div class="eyebrow">Step 1 of 2</div><h1>Who else will record time?</h1><p class="muted">Create the first Member account. You can add more people later.</p>${accountForm()}<div class="wizard-actions"><button class="btn ghost" data-skip="account">Skip for now</button><span class="muted">Required before setup is complete</span></div>`;else if(step===2)body=`<div class="eyebrow">Step 2 of 2</div><h1>Who is the first Client?</h1><p class="muted">Members need an active Client before they can record time.</p>${clientForm()}<div class="wizard-actions"><button class="btn ghost" data-back>Back</button><span class="muted">Required before setup is complete</span></div>`;else body=`<div class="eyebrow">Setup complete</div><h1>Ready for the first Time Entry</h1><p class="muted">The workspace has another account and an active Client.</p><div class="summary-block"><div class="summary-item"><strong>${state.accounts.length} active accounts</strong>${escaped(state.accounts.map(a=>a.name).join(', '))}</div><div class="summary-item"><strong>${state.clients.length} active Client</strong>${escaped(state.clients.join(', '))}</div></div><div class="notice">Setup ends now. Future account and Client changes happen in Administration.</div><div class="wizard-actions"><span></span><button class="btn primary">Go to My time</button></div>`;return `<div class="wizard-shell"><div class="wizard-steps">${nodes}</div><section class="wizard-card">${body}</section></div>`}
function C(){const firstUse=state.clients.length===0;return `<div class="admin-shell"><div class="page-head" style="margin-left:0"><div class="eyebrow">Administration</div><h1>Workspace overview</h1><p class="muted">Manage accounts and Clients from the normal administration surface.</p></div>${firstUse?`<div class="ready-banner"><div><strong>Create the first Client</strong><div class="muted">A Client is the only prerequisite for recording the first Time Entry. Additional accounts are optional.</div></div></div>`:''}<div class="admin-grid"><section class="panel"><div class="panel-head"><div><h2>Accounts</h2><span class="muted">People who can access this workspace.</span></div></div>${state.accounts.length?`<table class="table"><thead><tr><th>Name</th><th>Username</th><th>Role</th></tr></thead><tbody>${state.accounts.map(a=>`<tr><td>${escaped(a.name)}</td><td>${escaped(a.username)}</td><td><span class="tag ${a.role==='Administrator'?'admin':''}">${a.role}</span></td></tr>`).join('')}</tbody></table>`:''}<div class="inline-form"><h3>Add account</h3>${accountForm()}</div></section><section class="panel"><div class="panel-head"><div><h2>Clients</h2><span class="muted">Time is recorded directly against Clients.</span></div></div>${state.clients.length?`<div class="created-list">${clientRows()}</div>`:'<div class="empty">No Clients yet. Create one to enable time entry.</div>'}<div class="inline-form"><h3>Add Client</h3>${clientForm()}</div></section></div></div>`}
function render(){const v=variant();document.querySelector('#variantLabel').textContent=`${v} — ${variants.find(x=>x.key===v).name}`;app.innerHTML=({A,B,C})[v]();bind()}
function bindForm(id,kind){const form=document.querySelector(`#${id}`);if(!form)return;form.onsubmit=e=>{e.preventDefault();const data=new FormData(form),error=form.querySelector('.error');if(kind==='account'){const name=data.get('name').trim(),username=data.get('username').trim();if(state.accounts.some(a=>a.username.toLowerCase()===username.toLowerCase())){error.textContent='Username must be unique in the workspace.';return}state.accounts.push({name,username,role:data.get('role')});if(variant()==='B')state.wizardStep=2}else{const name=data.get('name').trim();if(state.clients.some(c=>c.toLowerCase()===name.toLowerCase())){error.textContent='Client name must be unique, including archived Clients.';return}state.clients.push(name);if(variant()==='B')state.wizardStep=3}render()}}
function bind(){bindForm('accountForm','account');bindForm('clientForm','client');document.querySelector('[data-back]')?.addEventListener('click',()=>{state.wizardStep=1;render()});document.querySelector('[data-skip]')?.addEventListener('click',()=>{state.wizardStep=2;render()})}
function cycle(step){const i=variants.findIndex(v=>v.key===variant()),next=variants[(i+step+variants.length)%variants.length],url=new URL(location.href);url.searchParams.set('variant',next.key);history.replaceState({},'',url);render()}
document.querySelector('#previous').onclick=()=>cycle(-1);document.querySelector('#next').onclick=()=>cycle(1);addEventListener('keydown',e=>{if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)||document.activeElement.isContentEditable)return;if(e.key==='ArrowLeft')cycle(-1);if(e.key==='ArrowRight')cycle(1)});render();
</script>
</body>
</html>
